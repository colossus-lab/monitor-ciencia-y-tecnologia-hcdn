<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProyectosCyT · Dashboard Ciencia y Tecnología</title>
<style>
/* ── NECO FONT ───────────────────────────── */
@font-face {
  font-family: 'Neco';
  src: url('fonts/Neco-Variable.woff2') format('woff2'),
       url('fonts/Neco-Variable.woff') format('woff');
  font-weight: 400 900;
  font-display: swap;
  font-style: normal;
}
@font-face {
  font-family: 'Neco';
  src: url('fonts/Neco-VariableItalic.woff2') format('woff2'),
       url('fonts/Neco-VariableItalic.woff') format('woff');
  font-weight: 400 900;
  font-display: swap;
  font-style: italic;
}

/* ── TOKENS ────────────────────────────── */
:root {
  --bg:      #f5f0e8;
  --surface: #ede8df;
  --surface2:#e5dfd4;
  --border:  rgba(0,0,0,.1);
  --text:    #1c1917;
  --muted:   #78716c;
  --lime:    #2d6a2d;
  --blue:    #1a4a8a;
  --violet:  #6d28d9;
  --radius:  16px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
body { background:var(--bg); color:var(--text); font-family:'Neco',system-ui,sans-serif; min-height:100vh }
a { color:inherit; text-decoration:none }
::-webkit-scrollbar { width:5px }
::-webkit-scrollbar-track { background:var(--bg) }
::-webkit-scrollbar-thumb { background:#c0b5a0; border-radius:3px }

/* ── LAYOUT ────────────────────────────── */
.app { max-width:1200px; margin:0 auto; padding:0 24px 64px }
@media(max-width:600px) {
  .app { padding:0 14px 40px }
  .header { padding:20px 0 16px; margin-bottom:20px }
  .header-top { gap:10px }
  .logo-icon { width:34px; height:34px; font-size:15px; border-radius:10px }
  .logo-text h1 { font-size:17px }
  .logo-text p { font-size:11px }
  .back-link { font-size:12px; padding:6px 10px }
  .intro-text { margin-bottom:20px }
  .donut-section { padding:20px 16px }
  .donut-section h2 { font-size:18px }
  .legend-item { padding:9px 10px }
  .legend-name { font-size:13px }
  .legend-count { font-size:12px }
  .modal { max-height:92vh }
  .modal-header { padding:16px 18px }
  .modal-body { padding:14px 18px 20px }
  .proj-card { padding:12px }
}

/* ── HEADER ────────────────────────────── */
.header { padding:32px 0 24px; border-bottom:1px solid var(--border); margin-bottom:32px }
.header-top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px }
.logo { display:flex; align-items:center; gap:12px }
.logo-icon {
  width:42px; height:42px; border-radius:12px;
  background:linear-gradient(135deg, var(--violet), #9333ea);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:18px; color:#fff;
}
.logo-text h1 { font-size:22px; font-weight:700; letter-spacing:-.3px }
.logo-text p { font-size:12px; color:var(--muted); margin-top:2px }
.back-link {
  color:var(--muted); border:1px solid var(--border); border-radius:10px;
  padding:8px 14px; font-size:13px; transition:all .2s;
}
.back-link:hover { border-color:rgba(45,106,45,.4); color:var(--lime) }

/* ── INTRO ─────────────────────────────── */
.intro-text {
  max-width:1100px;
  margin:0 auto 28px;
  text-align:center;
  font-size:clamp(20px, 2.2vw, 30px);
  line-height:1.38;
  letter-spacing:-.3px;
  color:var(--text);
  padding:0 8px;
}
.intro-text strong { color:var(--lime); font-weight:700 }
.intro-stats {
  display:flex; gap:28px; justify-content:center; margin-top:22px; flex-wrap:wrap;
}
.intro-stat {
  display:flex; align-items:baseline; gap:7px;
}
.intro-stat-num { font-size:clamp(32px, 4vw, 48px); font-weight:800; color:var(--text); line-height:1 }
.intro-stat-label { font-size:14px; color:var(--muted) }

/* ── DONUT SECTION ─────────────────────── */
.donut-section {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:36px; margin-bottom:36px;
}
.donut-section h2 { font-size:22px; font-weight:700; margin-bottom:6px }
.donut-section .subtitle {
  font-size:12px; color:var(--muted); margin-bottom:28px;
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(0,0,0,.05); border:1px solid var(--border);
  border-radius:999px; padding:5px 12px 5px 10px;
}
.donut-layout {
  display:flex; align-items:center; gap:44px;
}
@media(max-width:900px) {
  .donut-layout { flex-direction:column; align-items:stretch }
  .donut-canvas-wrap { width:100% !important; height:auto !important; aspect-ratio:1 }
}
.donut-canvas-wrap {
  flex-shrink:0; position:relative;
  width:560px; height:560px;
}
.donut-canvas-wrap canvas { cursor:pointer; width:100%; height:100% }
.donut-center {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; pointer-events:none;
}
.donut-center-num { font-size:clamp(36px, 5vw, 52px); font-weight:800; line-height:1 }
.donut-center-label { font-size:13px; color:var(--muted); margin-top:4px }

/* Legend */
.donut-legend { flex:1; min-width:220px }
.legend-item {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  border-radius:12px; cursor:pointer; transition:background .15s;
  margin-bottom:3px;
}
.legend-item:hover, .legend-item.active { background:rgba(0,0,0,.06) }
.legend-swatch { width:14px; height:14px; border-radius:4px; flex-shrink:0 }
.legend-name { font-size:14px; font-weight:600; flex:1 }
.legend-count { font-size:13px; color:var(--muted); font-weight:700 }

/* ── MODAL ─────────────────────────────── */
.modal-overlay {
  position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.35); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex }
.modal {
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
  max-width:700px; width:100%; max-height:85vh; overflow-y:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.18);
}
@media(max-width:600px) {
  .modal-overlay { padding:0 }
  .modal { max-height:100vh; height:100vh; border-radius:0; max-width:100% }
}
.modal-header {
  padding:22px 26px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.modal-header h3 { font-size:18px; font-weight:700 }
.modal-close {
  width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.modal-close:hover { border-color:rgba(0,0,0,.25) }
.modal-body { padding:20px 26px 26px }

/* Sub-category pills in modal */
.sub-section { margin-bottom:20px }
.sub-header {
  display:flex; align-items:center; gap:8px; margin-bottom:10px;
  padding-bottom:8px; border-bottom:1px solid var(--border);
}
.sub-swatch { width:10px; height:10px; border-radius:3px }
.sub-name { font-size:15px; font-weight:700 }
.sub-count { font-size:12px; color:var(--muted) }

/* Project cards inside modal */
.proj-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:8px; transition:all .15s;
}
.proj-card:hover { border-color:rgba(0,0,0,.22); transform:translateY(-1px) }
.proj-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px }
.proj-exp { font-size:11px; color:var(--muted); font-weight:700; letter-spacing:.3px; text-transform:uppercase }
.proj-desc { font-size:13px; line-height:1.5; margin-top:6px; color:rgba(28,25,23,.82) }
.proj-meta { font-size:11px; color:var(--muted); margin-top:6px }
.proj-pdf {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:700; color:var(--blue);
  border:1px solid rgba(26,74,138,.3); border-radius:6px;
  padding:4px 10px; transition:all .2s; flex-shrink:0;
}
.proj-pdf:hover { background:rgba(26,74,138,.08); border-color:var(--blue) }

/* ── FOOTER ────────────────────────────── */
footer { border-top:1px solid var(--border); padding:24px; text-align:center }
.footer-text { font-size:12px; color:var(--muted) }

/* ── CHATBOT ───────────────────────────── */
.chatbot-fab{
  position:fixed;right:26px;bottom:24px;z-index:1400;
  width:74px;height:74px;border-radius:50%;border:1px solid rgba(26,74,138,.42);
  background:linear-gradient(140deg,rgba(26,74,138,.18),rgba(109,40,217,.14));
  color:var(--text);font-size:30px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 14px 34px rgba(0,0,0,.28);transition:all .2s;
}
.chatbot-fab:hover{transform:translateY(-3px) scale(1.04);border-color:var(--blue);color:var(--blue)}
.chatbot-panel{
  position:fixed;right:20px;bottom:102px;z-index:1400;width:360px;max-width:calc(100vw - 24px);
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  display:none;flex-direction:column;overflow:hidden;box-shadow:0 16px 44px rgba(0,0,0,.36);
}
.chatbot-panel.active{display:flex}
.chatbot-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:12px 14px;border-bottom:1px solid var(--border);background:rgba(26,74,138,.08);
}
.chatbot-title{font-size:13px;font-weight:700;color:var(--blue)}
.chatbot-sub{font-size:10px;color:var(--muted);margin-top:1px}
.chatbot-close{background:transparent;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:8px;cursor:pointer}
.chatbot-close:hover{border-color:var(--blue);color:var(--blue)}
.chatbot-messages{max-height:380px;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--surface)}
.chat-msg{padding:9px 11px;border-radius:10px;font-size:12px;line-height:1.5;white-space:pre-wrap}
.chat-msg.user{align-self:flex-end;background:rgba(26,74,138,.12);border:1px solid rgba(26,74,138,.2)}
.chat-msg.bot{align-self:flex-start;background:var(--surface2);border:1px solid var(--border)}
.chatbot-status{min-height:18px;padding:0 12px 8px;color:var(--muted);font-size:10px}
.chatbot-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:rgba(0,0,0,.03)}
.chatbot-text{
  flex:1;resize:none;height:40px;max-height:110px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:12px;padding:10px 12px;outline:none
}
.chatbot-text:focus{border-color:rgba(26,74,138,.45)}
.chatbot-send{
  border:1px solid rgba(26,74,138,.38);background:rgba(26,74,138,.12);color:var(--blue);
  padding:0 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer
}
.chatbot-send:hover:not(:disabled){background:rgba(26,74,138,.2)}
.chatbot-send:disabled{opacity:.5;cursor:not-allowed}
@media (max-width:640px){
  .chatbot-fab{right:18px;bottom:18px;width:68px;height:68px;font-size:28px}
  .chatbot-panel{left:8px;right:8px;bottom:84px;width:auto;max-width:none;border-radius:12px}
  .chatbot-messages{max-height:48vh;padding:10px}
  .chatbot-input{padding:8px}
  .chatbot-text{height:44px;font-size:13px}
}
</style>
</head>

</div>

<button id="chatbotFab" class="chatbot-fab" onclick="toggleChatbot()" title="Abrir LeyesBot">🧠</button>

<div id="chatbotPanel" class="chatbot-panel" aria-live="polite">

  <div class="chatbot-input">

</div>

<footer>

/* ── Donut chart on Canvas ── */
const canvas = document.getElementById('donutCanvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
let W, H, cx, cy, outerR, innerR;

function sizeCanvas() {
  const wrap = canvas.parentElement;
  const sz = Math.min(wrap.clientWidth, wrap.clientHeight || wrap.clientWidth);
  W = sz; H = sz;
  canvas.width = sz * dpr;
  canvas.height = sz * dpr;
  canvas.style.width = sz + 'px';
  canvas.style.height = sz + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2; cy = H / 2;
  outerR = W * 0.397; innerR = W * 0.228;
}
sizeCanvas();
window.addEventListener('resize', () => { sizeCanvas(); buildSlices(); drawDonut(); });
let slices = [];
let hoveredSlice = -1;

function buildSlices() {
  const total = CYT_DATA.reduce((s,g) => s + g.count, 0);
  let angle = -Math.PI / 2;
  slices = [];
  CYT_DATA.forEach((g, i) => {
    const sweep = (g.count / total) * Math.PI * 2;
    slices.push({ start: angle, end: angle + sweep, color: COLORS[i % COLORS.length], group: g, index: i });
    angle += sweep;
  });
}

function drawDonut() {
  ctx.clearRect(0, 0, W, H);
  slices.forEach((s, i) => {
    const isHovered = i === hoveredSlice;
    const midAngle = (s.start + s.end) / 2;
    const offset = isHovered ? 8 : 0;
    const ox = cx + Math.cos(midAngle) * offset;
    const oy = cy + Math.sin(midAngle) * offset;
    const r = isHovered ? outerR + 4 : outerR;

    ctx.beginPath();
    ctx.arc(ox, oy, r, s.start, s.end);
    ctx.arc(ox, oy, innerR, s.end, s.start, true);
    ctx.closePath();
    ctx.fillStyle = s.color;
    ctx.globalAlpha = (hoveredSlice >= 0 && !isHovered) ? 0.4 : 1;
    ctx.fill();
    ctx.globalAlpha = 1;

    /* slice separator */
    ctx.beginPath();
    ctx.arc(ox, oy, r, s.start, s.end);
    ctx.arc(ox, oy, innerR, s.end, s.start, true);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(245,240,232,.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    /* percentage label */
    const total = CYT_DATA.reduce((sum,g) => sum + g.count, 0);
    const pct = Math.round(s.group.count / total * 100);
    if (pct >= 5) {
      const labelR = (outerR + innerR) / 2;
      const lx = ox + Math.cos(midAngle) * labelR;
      const ly = oy + Math.sin(midAngle) * labelR;
      ctx.fillStyle = '#fff';
      ctx.font = '700 13px Neco, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pct + '%', lx, ly);
    }
  });
}

function getSliceAt(x, y) {
  const dx = x - cx, dy = y - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < innerR || dist > outerR + 12) return -1;
  let angle = Math.atan2(dy, dx);
  if (angle < -Math.PI / 2) angle += Math.PI * 2;
  for (let i = 0; i < slices.length; i++) {
    let start = slices[i].start, end = slices[i].end;
    if (angle >= start && angle <= end) return i;
  }
  return -1;
}

function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) };
}

canvas.addEventListener('mousemove', e => {
  const {x, y} = canvasCoords(e);
  const idx = getSliceAt(x, y);
  if (idx !== hoveredSlice) {
    hoveredSlice = idx;
    drawDonut();
    syncLegendHover(idx);
    canvas.style.cursor = idx >= 0 ? 'pointer' : 'default';
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredSlice = -1;
  drawDonut();
  syncLegendHover(-1);
});

canvas.addEventListener('click', e => {
  const {x, y} = canvasCoords(e);
  const idx = getSliceAt(x, y);
  if (idx >= 0) openModal(idx);
});

/* Touch support for mobile */
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const {x, y} = canvasCoords(touch);
  const idx = getSliceAt(x, y);
  if (idx >= 0) openModal(idx);
}, { passive: false });

/* ── Legend ── */
function renderLegend() {
  const legend = document.getElementById('donutLegend');
  legend.innerHTML = CYT_DATA.map((g, i) => `
    <div class="legend-item" data-idx="${i}"
         onmouseenter="hoverSlice(${i})" onmouseleave="hoverSlice(-1)"
         onclick="openModal(${i})">
      <div class="legend-swatch" style="background:${COLORS[i % COLORS.length]}"></div>
      <span class="legend-name">${g.name}</span>
      <span class="legend-count">${g.count}</span>
    </div>
  `).join('');
}

function hoverSlice(idx) {
  hoveredSlice = idx;
  drawDonut();
  syncLegendHover(idx);
}

function syncLegendHover(idx) {
  document.querySelectorAll('.legend-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

/* ── Modal ── */
function openModal(idx) {
  const group = CYT_DATA[idx];
  const color = COLORS[idx % COLORS.length];
  document.getElementById('modalTitle').innerHTML =
    `<span style="color:${color}">●</span> ${group.name} <span style="font-weight:400;font-size:14px;color:var(--muted)">(${group.count} proyectos)</span>`;

  let html = '';
  group.subs.forEach(sub => {
    html += `<div class="sub-section">
      <div class="sub-header">
        <div class="sub-swatch" style="background:${color}"></div>
        <span class="sub-name">${sub.name}</span>
        <span class="sub-count">${sub.count} proyecto${sub.count !== 1 ? 's' : ''}</span>
      </div>`;
    sub.projects.forEach(p => {
      const pdfBtn = p.pdf
        ? `<a class="proj-pdf" href="${p.pdf}" target="_blank">📄 Ver PDF</a>`
        : '';
      html += `<div class="proj-card">
        <div class="proj-top">
          <div>
            <div class="proj-exp">${p.exp}</div>
            <div class="proj-desc">${p.desc}</div>
            <div class="proj-meta">${p.autor}${p.bloque ? ' · ' + p.bloque : ''} · ${p.año}</div>
          </div>
          ${pdfBtn}
        </div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    toggleChatbot(false);
  }
});

/* ── Chatbot ── */
let chatbotInitialized = false;
let chatbotLoading = false;

function toggleChatbot(forceState = null) {
  const panel = document.getElementById('chatbotPanel');
  if(!panel) return;
  const open = forceState === null ? !panel.classList.contains('active') : !!forceState;
  panel.classList.toggle('active', open);
  if(open) {
    initChatbotIfNeeded();
    document.getElementById('chatbotInput')?.focus();
  }
}

function initChatbotIfNeeded() {
  if(chatbotInitialized) return;
  chatbotInitialized = true;
  appendChatMessage('bot', 'Hola, soy LeyesBot para CyT. Preguntame sobre los proyectos de Ciencia y Tecnología.');
}

function appendChatMessage(role, text) {
  const box = document.getElementById('chatbotMessages');
  if(!box) return;
  const el = document.createElement('div');
  el.className = `chat-msg ${role}`;
  el.textContent = text;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function setChatStatus(text='') {
  const st = document.getElementById('chatbotStatus');
  if(st) st.textContent = text;
}

function onChatInputKeydown(event) {
  if(event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendChatMessage();
  }
}

function getCYTChatContext() {
  const projects = [];
  CYT_DATA.forEach(group => {
    group.subs.forEach(sub => {
      sub.projects.forEach(p => {
        projects.push({
          id: p.exp,
          expediente: p.exp,
          titulo: p.desc,
          resumen: p.desc,
          grupo: group.name,
          subtematica: sub.name,
          autor_principal: p.autor || '',
          bloque: p.bloque || '',
          año: p.año,
          pdf_path: p.pdf || '',
        });
      });
    });
  });
  return projects;
}

async function sendChatMessage() {
  if(chatbotLoading) return;
  const input = document.getElementById('chatbotInput');
  const sendBtn = document.getElementById('chatbotSend');
  const question = (input?.value || '').trim();
  if(!question) return;

  appendChatMessage('user', question);
  input.value = '';
  chatbotLoading = true;
  if(sendBtn) sendBtn.disabled = true;
  setChatStatus('LeyesBot está pensando...');

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pregunta: question,
        scope: 'cyt',
        contexto: getCYTChatContext(),
      }),
    });

    const data = await resp.json().catch(() => ({}));
    if(!resp.ok) {
      const err = data?.error || 'No se pudo obtener respuesta del servidor.';
      appendChatMessage('bot', `Error: ${err}`);
    } else {
      const answer = data?.texto || data?.respuesta || 'Sin respuesta del modelo.';
      appendChatMessage('bot', answer);
    }
  } catch (err) {
    appendChatMessage('bot', 'Error de conexión con el endpoint /api/chat.');
  } finally {
    chatbotLoading = false;
    if(sendBtn) sendBtn.disabled = false;
    setChatStatus('');
  }
}

/* ── Init ── */
renderIntro();
buildSlices();
drawDonut();
renderLegend();
</script>
</body>
</html>
